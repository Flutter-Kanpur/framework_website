<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#4167F2">
  <!-- 8-pointed starburst / asterisk logo -->
  <!-- Vertical bar -->
  <rect x="88" y="5" width="24" height="80" rx="2" />
  <rect x="88" y="115" width="24" height="80" rx="2" />
  <!-- Horizontal bar -->
  <rect x="5" y="88" width="80" height="24" rx="2" />
  <rect x="115" y="88" width="80" height="24" rx="2" />
  <!-- Diagonal top-left to bottom-right -->
  <rect x="88" y="5" width="24" height="80" rx="2" transform="rotate(45 100 100)" />
  <rect x="88" y="115" width="24" height="80" rx="2" transform="rotate(45 100 100)" />
  <!-- Diagonal top-right to bottom-left -->
  <rect x="88" y="5" width="24" height="80" rx="2" transform="rotate(-45 100 100)" />
  <rect x="88" y="115" width="24" height="80" rx="2" transform="rotate(-45 100 100)" />
</svg>
